name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run ruff on core packages
        run: python -m ruff check af_phase2 af_phase3 af_phase4 hooks scripts

      - name: Run pytest (excluding Scalpel Docker bridge)
        run: |
          python -m pytest samples/violations/tests/ -v \
            --ignore=samples/violations/tests/test_af_phase3_scalpel_bridge.py

  lint-workflow:
    name: Lint GitHub Actions workflow
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install actionlint
        run: pip install actionlint-py

      - name: Run actionlint
        run: actionlint
